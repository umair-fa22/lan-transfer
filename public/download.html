<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Download Files</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container-box">
    <div class="mb-3 d-flex justify-content-between align-items-center">
      <a href="/" class="btn btn-sm btn-outline-secondary">← Back</a>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-warning" onclick="toggleSettings()">
          ⚙️ Path
        </button>
        <button class="btn btn-sm btn-outline-primary" onclick="loadFiles()">
          🔄 Refresh
        </button>
      </div>
    </div>

    <!-- Settings panel -->
    <div id="settingsPanel" class="settings-panel mb-3 d-none">
      <p class="mb-2 fw-semibold" style="font-size: 0.9rem">
        📂 Change Download Directory
      </p>

      <div class="path-bar mb-2" id="currentPathDisplay">Loading...</div>

      <div class="d-flex gap-2">
        <input type="text" id="newPathInput" class="form-control form-control-sm" placeholder="path/to/downloads" />
        <button class="btn btn-sm btn-warning text-dark fw-semibold" onclick="applyPath()" style="white-space: nowrap">
          Apply
        </button>
      </div>

      <div class="mt-2 d-flex flex-wrap gap-1" id="quickPaths">
        <span class="badge bg-secondary" style="cursor: pointer" onclick="setQuick('/storage/emulated/0/Download')">📱
          Mobile Home</span>
        <span class="badge bg-secondary" style="cursor: pointer" onclick="setQuick('HOME')">🪟 Windows Home</span>
        <span class="badge bg-secondary" style="cursor: pointer" onclick="setQuick('HOME')">🐧 Linux Home</span>
      </div>

      <div id="applyStatus" class="mt-2"></div>
    </div>

    <!-- Main card -->
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <!-- Breadcrumb + back button -->
        <div class="d-flex align-items-center gap-2 my-2">
          
          <div class="breadcrumb-custom flex-grow-1" id="breadcrumb"></div>
          <button id="backBtn" class="btn btn-sm btn-outline-secondary d-none" onclick="goBack()"
            title="Go up (Backspace)">
            ⬆ Up
          </button>
        </div>

        <div class="mb-3 d-flex justify-content-between align-items-center gap-2">
          <span id="summary" class="badge bg-secondary">Loading...</span>
          <input type="text" id="search" class="form-control form-control-sm" placeholder="🔍 Search..."
            oninput="filterEntries()" style="max-width: 180px" />
        </div>

        <ul id="fileList" class="list-group" style="max-height: 520px; overflow-y: auto"></ul>

        <div id="emptyState" class="text-center py-5 text-muted d-none">
          <div style="font-size: 2.5rem">📭</div>
          <p class="mt-2">No files found</p>
        </div>
      </div>
    </div>
  </div>

  <script></script>
</body>
<script src="app.js"></script>

</html>
